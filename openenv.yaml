name: "HospitalResourceManagement"
version: "1.0.0"
description: "AI agent for managing hospital operations: bed allocation, staff management, and patient flow."

metadata:
  author: "Ignitors Team"
  domain: "Healthcare Operations"
  complexity: "High"
  real_world_relevance: "Very High"

environment:
  type: "hospital_operations"
  max_steps: 50
  action_space:
    type: "structured"
    actions:
      - name: "assign_bed"
        description: "Assign patient to available bed"
        required_fields: ["patient_id", "bed_id"]
      - name: "allocate_staff"
        description: "Allocate staff to patient"
        required_fields: ["staff_id", "patient_id"]
      - name: "discharge_patient"
        description: "Discharge patient"
        required_fields: ["patient_id"]
      - name: "transfer_patient"
        description: "Transfer patient"
        required_fields: ["patient_id", "new_bed_id"]
      - name: "request_equipment"
        description: "Request equipment"
        required_fields: ["equipment_type", "patient_id"]
      - name: "escalate_shortage"
        description: "Escalate shortage"
        required_fields: ["shortage_type", "target"]
      - name: "skip"
        description: "No-op"
        required_fields: []

  observation_space:
    type: "structured"
    fields:
      step: "Current step number"
      time: "Simulation time"
      beds: "Status of all ward beds (ICU, General, Isolation, Pediatric)"
      staff: "Available doctors and nurses with specialties"
      equipment: "Equipment status and location"
      pending_patients: "Patients waiting for beds"
      admitted_patients: "Patients currently in beds"
      escalations: "System escalations history"

  reward_function:
    type: "composite"
    components:
      - name: "correct_bed_type"
        weight: 0.2
        description: "Correct ward assignment"
      - name: "priority_respect"
        weight: 0.2
        description: "Critical patients first"
      - name: "resource_allocation"
        weight: 0.2
        description: "No double-booking"
      - name: "staff_ratio"
        weight: 0.2
        description: "Balanced patient-staff load"
      - name: "efficiency"
        weight: 0.2
        description: "Resolution within step limit"

  penalties:
    - value: -0.4
      trigger: "Critical patient left unattended"
    - value: -0.5
      trigger: "Patient death due to mismanagement"

tasks:
  - name: "easy"
    difficulty: "Easy"
    max_steps: 20
    objective: "Assign correct ward and respect priority"
  - name: "medium"
    difficulty: "Medium"
    max_steps: 30
    objective: "Manage ICU resource conflicts"
  - name: "hard"
    difficulty: "Hard"
    max_steps: 40
    objective: "Maximize survival in mass casualty event"

endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"
  grade: "/grade"
  health: "/health"

server:
  host: "0.0.0.0"
  port: 8000
  framework: "fastapi"

docker:
  image: "hospital-resource-management:latest"
  port: 8000
  build_context: "."
